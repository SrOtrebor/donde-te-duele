<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapeador de Íconos - Hero</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0ece3; display: flex; gap: 0; height: 100vh; overflow: hidden; }

  /* ====== GALERÍA IZQUIERDA ====== */
  #gallery {
    width: 200px;
    min-width: 200px;
    background: #2c2c2c;
    padding: 10px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  #gallery h3 { color: #fff; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; text-align: center; }
  .icon-item {
    background: #fff;
    border: 2px solid #555;
    border-radius: 8px;
    padding: 8px;
    cursor: grab;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: border-color 0.15s, transform 0.15s;
  }
  .icon-item:hover { border-color: #ffa85a; transform: scale(1.03); }
  .icon-item:active { cursor: grabbing; }
  .icon-item img { width: 64px; height: 64px; object-fit: contain; }
  .icon-item span { font-size: 9px; color: #666; text-align: center; word-break: break-all; }

  /* ====== ÁREA PRINCIPAL ====== */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #toolbar {
    background: #3b2017;
    color: #ffa85a;
    padding: 10px 20px;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  #toolbar button {
    background: #ffa85a;
    color: #3b2017;
    border: none;
    border-radius: 6px;
    padding: 6px 16px;
    font-weight: 700;
    cursor: pointer;
    font-size: 12px;
  }

  /* ====== HERO MOCKUP ====== */
  #hero-mockup {
    flex: 1;
    display: flex;
    align-items: stretch;
    background: #fdfaf1;
    position: relative;
    overflow: hidden;
  }

  /* Columnas laterales */
  .side-col {
    display: flex;
    flex-direction: column;
    gap: 0;
    width: 200px;
    min-width: 200px;
  }
  .side-col .col-pair {
    display: grid;
    grid-template-columns: 1fr 1fr;
    flex: 1;
    gap: 0;
  }

  .drop-cell {
    border: 2px dashed #c8b8a8;
    background: rgba(255,255,255,0.5);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    position: relative;
    min-height: 60px;
    overflow: hidden;
  }
  .drop-cell:hover { background: rgba(255, 168, 114, 0.2); border-color: #ffa872; }
  .drop-cell.drag-over { background: rgba(255, 168, 114, 0.4); border-color: #ffa872; border-style: solid; }
  .drop-cell.filled { border-style: solid; border-color: #bfd43b; background: rgba(191, 212, 59, 0.1); }
  .drop-cell img { width: 70%; height: 70%; object-fit: contain; }
  .drop-cell .cell-label { font-size: 9px; color: #999; }
  .drop-cell .cell-name { font-size: 8px; color: #3b2017; font-weight: 700; text-align: center; padding: 2px; position: absolute; bottom: 2px; left: 0; right: 0; }
  .drop-cell .remove-btn {
    position: absolute;
    top: 2px;
    right: 3px;
    background: #e53935;
    color: white;
    border: none;
    border-radius: 50%;
    width: 14px;
    height: 14px;
    font-size: 9px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .drop-cell.filled .remove-btn { display: flex; }

  /* Centro del hero */
  #hero-center {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
    background: #fdfaf1;
  }
  #hero-center p { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: #3b2017; margin-bottom: 5px; }
  #hero-center h1 { font-size: 36px; font-weight: 900; text-transform: uppercase; color: #3b2017; line-height: 1; margin-bottom: 16px; }
  #hero-center .btn-mock { background: #ffe8bf; border: 2px solid #3b2017; border-radius: 8px; padding: 10px 24px; font-size: 12px; font-weight: 700; text-transform: uppercase; color: #3b2017; }

  /* Indicadores de columna */
  .col-label {
    background: #3b2017;
    color: #ffa85a;
    font-size: 10px;
    font-weight: 700;
    text-align: center;
    padding: 4px;
    letter-spacing: 1px;
  }

  /* ====== RESULTADO ====== */
  #result-panel {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.8);
    z-index: 100;
    overflow-y: auto;
    padding: 30px;
  }
  #result-content {
    background: #1e1e1e;
    color: #a8ff78;
    border-radius: 12px;
    padding: 24px;
    max-width: 900px;
    margin: 0 auto;
    font-family: monospace;
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
  }
  #result-content h2 { color: #ffa85a; margin-bottom: 16px; font-size: 18px; }
  #close-result {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #e53935;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    z-index: 101;
  }
</style>
</head>
<body>

<!-- ====== GALERÍA DE ÍCONOS ====== -->
<div id="gallery">
  <h3>📦 Íconos</h3>
</div>

<!-- ====== ÁREA PRINCIPAL ====== -->
<div id="main">
  <div id="toolbar">
    <span>🎯 Arrastrá cada ícono a su posición en el HERO — izquierda o derecha</span>
    <button onclick="exportResult()">📋 Ver Resultado</button>
  </div>

  <div id="hero-mockup">

    <!-- COLUMNA IZQUIERDA (2 cols × 5 filas = 10 celdas) -->
    <div class="side-col">
      <div class="col-label">◀ IZQUIERDA</div>
      <div class="col-pair" id="left-grid" style="flex:1; display:grid; grid-template-columns:1fr 1fr; grid-template-rows:repeat(5,1fr);">
        <!-- 10 drop zones izquierda -->
      </div>
    </div>

    <!-- CENTRO DEL HERO -->
    <div id="hero-center">
      <p>CLÍNICA ONLINE</p>
      <h1>DÓNDE TE DUELE<br>LA VIDA HOY</h1>
      <div class="btn-mock">VER DE QUÉ SE TRATA</div>
    </div>

    <!-- COLUMNA DERECHA (2 cols × 5 filas = 10 celdas) -->
    <div class="side-col">
      <div class="col-label">DERECHA ▶</div>
      <div class="col-pair" id="right-grid" style="flex:1; display:grid; grid-template-columns:1fr 1fr; grid-template-rows:repeat(5,1fr);">
        <!-- 10 drop zones derecha -->
      </div>
    </div>

  </div>
</div>

<!-- PANEL RESULTADO -->
<div id="result-panel">
  <button id="close-result" onclick="document.getElementById('result-panel').style.display='none'">✕ Cerrar</button>
  <div id="result-content"></div>
</div>

<script>
// ====== LISTA DE ÍCONOS ======
const icons = [
  "COMPU-08 1.svg",
  "Group 107.svg",
  "Group 108.svg",
  "Group 109.svg",
  "Group 110.svg",
  "Group 111.svg",
  "Group 112.svg",
  "Group 113.svg",
  "Group 114.svg",
  "Group 116.svg",
  "Group 19.svg",
  "Group 33.svg",
  "Group 34.svg",
  "Group 35-1.svg",
  "Group 35.svg",
  "Group 89.svg",
  "Group 91.svg",
  "Group 92.svg",
  "Group-1.svg",
  "Group-2.svg",
  "Group-3.svg",
  "Group-4.svg",
  "Group-5.svg",
  "Group-6.svg",
  "Group-7.svg",
  "Group-8.svg",
  "Group-9.svg",
  "Group-10.svg",
  "Group-11.svg",
  "Group-12.svg",
  "Group-13.svg",
  "Group-14.svg",
  "Group-15.svg",
  "Group.svg",
  "Vector 1.svg",
  "Vector 1-1.svg",
  "Vector 1-2.svg",
  "Vector 1-3.svg",
  "Vector 1-4.svg",
  "Vector 1-5.svg",
  "Vector 1-6.svg",
  "Vector-1.svg",
  "Vector-2.svg",
  "Vector-3.svg",
  "Vector-4.svg",
  "Vector-5.svg",
  "Vector-6.svg",
  "Vector-7.svg",
  "Vector-8.svg",
  "Vector-9.svg",
  "Vector-10.svg",
  "Vector-11.svg",
  "Vector-12.svg",
  "Vector-13.svg",
  "Vector-14.svg",
  "Vector-15.svg",
  "Vector-16.svg",
  "Vector-17.svg",
  "Vector-18.svg",
  "Vector-19.svg",
  "Vector-20.svg",
  "Vector-21.svg",
  "Vector-22.svg",
  "Vector-23.svg",
  "Vector-24.svg",
  "Vector-25.svg",
  "Vector-26.svg",
  "Vector-27.svg",
  "Vector-28.svg",
  "Vector-29.svg",
  "Vector-30.svg",
  "Vector-31.svg",
  "Vector-32.svg",
  "Vector-33.svg",
  "Vector-34.svg",
  "Vector-35.svg",
  "Vector-36.svg",
  "Vector-37.svg",
  "Vector-38.svg",
  "Vector-39.svg",
  "Vector-40.svg",
  "Vector.svg",
  "ICONOS RRSS [Convertido]_fb 1.svg",
  "ICONOS RRSS [Convertido]_ig 1.svg",
  "ICONOS RRSS [Convertido]_tik tok 1.svg",
];

const BASE_PATH = "./home assets/DTDLVH_Elearning_HOME_icon/";
let draggedIcon = null;

// ====== CONSTRUIR GALERÍA ======
const gallery = document.getElementById('gallery');
icons.forEach(name => {
  const div = document.createElement('div');
  div.className = 'icon-item';
  div.draggable = true;
  div.dataset.name = name;
  div.innerHTML = `
    <img src="${BASE_PATH}${encodeURIComponent(name)}" alt="${name}" onerror="this.style.opacity=0.2">
    <span>${name.replace('.svg','')}</span>
  `;
  div.addEventListener('dragstart', e => {
    draggedIcon = name;
    e.dataTransfer.setData('text/plain', name);
  });
  gallery.appendChild(div);
});

// ====== CONSTRUIR GRIDS ======
function buildGrid(containerId, side) {
  const container = document.getElementById(containerId);
  for (let i = 0; i < 10; i++) {
    const col = (i % 2 === 0) ? 'A' : 'B';
    const row = Math.floor(i / 2) + 1;
    const cell = document.createElement('div');
    cell.className = 'drop-cell';
    cell.dataset.id = `${side}-${col}${row}`;
    cell.dataset.side = side;
    cell.dataset.pos = `col${col}-fila${row}`;

    cell.innerHTML = `
      <span class="cell-label">${col}${row}</span>
      <button class="remove-btn" title="Quitar">✕</button>
    `;

    // Eventos drag & drop
    cell.addEventListener('dragover', e => { e.preventDefault(); cell.classList.add('drag-over'); });
    cell.addEventListener('dragleave', () => cell.classList.remove('drag-over'));
    cell.addEventListener('drop', e => {
      e.preventDefault();
      cell.classList.remove('drag-over');
      const name = e.dataTransfer.getData('text/plain') || draggedIcon;
      if (name) setIcon(cell, name);
    });

    // Quitar ícono
    cell.querySelector('.remove-btn').addEventListener('click', e => {
      e.stopPropagation();
      clearCell(cell);
    });

    container.appendChild(cell);
  }
}

buildGrid('left-grid', 'izq');
buildGrid('right-grid', 'der');

function setIcon(cell, name) {
  // Limpiar celda anterior
  const existing = cell.querySelector('img');
  if (existing) existing.remove();

  const label = cell.querySelector('.cell-label');
  if (label) label.style.display = 'none';

  // Insertar imagen
  const img = document.createElement('img');
  img.src = BASE_PATH + encodeURIComponent(name);
  img.alt = name;
  img.onerror = () => img.style.opacity = 0.3;
  cell.insertBefore(img, cell.firstChild);

  // Nombre debajo
  let nameTag = cell.querySelector('.cell-name');
  if (!nameTag) { nameTag = document.createElement('div'); nameTag.className = 'cell-name'; cell.appendChild(nameTag); }
  nameTag.textContent = name.replace('.svg','').substring(0, 18);

  cell.classList.add('filled');
  cell.dataset.icon = name;
}

function clearCell(cell) {
  const img = cell.querySelector('img');
  if (img) img.remove();
  const label = cell.querySelector('.cell-label');
  if (label) label.style.display = '';
  const nameTag = cell.querySelector('.cell-name');
  if (nameTag) nameTag.remove();
  cell.classList.remove('filled');
  delete cell.dataset.icon;
}

// ====== EXPORTAR RESULTADO ======
function exportResult() {
  const cells = document.querySelectorAll('.drop-cell');
  let output = '<h2>🗺️ MAPA DE ÍCONOS DEL HERO</h2>\n\n';

  output += '══ LADO IZQUIERDO ══\n';
  cells.forEach(cell => {
    if (cell.dataset.side !== 'izq') return;
    const icon = cell.dataset.icon || '(vacío)';
    output += `  ${cell.dataset.pos}: ${icon}\n`;
  });

  output += '\n══ LADO DERECHO ══\n';
  cells.forEach(cell => {
    if (cell.dataset.side !== 'der') return;
    const icon = cell.dataset.icon || '(vacío)';
    output += `  ${cell.dataset.pos}: ${icon}\n`;
  });

  document.getElementById('result-content').innerHTML = output;
  document.getElementById('result-panel').style.display = 'block';
}
</script>
</body>
</html>
